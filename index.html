<!DOCTYPE html>
<html lang="th">
<head>

<title>TPL Share — File Index</title>
<style>

  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0f172a;
    font-family:'Segoe UI',Tahoma,'Arial Unicode MS',sans-serif;
    min-height:100vh; padding:32px 20px; color:#e2e8f0;
  }
  header { text-align:center; margin-bottom:32px; }
  header h1 { font-size:26px; font-weight:800; color:#f8fafc; letter-spacing:-.5px; }
  header p  { color:#64748b; font-size:13px; margin-top:6px; }
  .count { text-align:center; color:#475569; font-size:12px; margin-bottom:20px; }
  .grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:16px; max-width:960px; margin:0 auto;
  }
  .card {
    background:#1e293b; border:1.5px solid #334155; border-radius:12px;
    padding:20px; text-decoration:none; color:inherit;
    display:flex; flex-direction:column; gap:10px;
    transition:border-color .2s,transform .15s;
  }
  .card:hover { border-color:#3b82f6; transform:translateY(-2px); }
  .card-top { display:flex; align-items:center; gap:12px; }
  .card-icon {
    width:40px; height:40px; border-radius:8px;
    display:flex; align-items:center; justify-content:center;
    font-size:20px; flex-shrink:0;
  }
  .card-title { font-size:14px; font-weight:700; color:#f1f5f9; line-height:1.4; }
  .card-desc  { font-size:12px; color:#94a3b8; line-height:1.5; }
  .card-tag {
    display:inline-block; background:rgba(59,130,246,.15); color:#60a5fa;
    font-size:11px; padding:2px 8px; border-radius:20px;
    border:1px solid rgba(59,130,246,.25); align-self:flex-start; margin-top:auto;
  }

</style>
</head>
<body>

    </div>
